<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Remote Controller - DeviceBridge</title><link rel="stylesheet" href="style.css"><script src="/socket.io/socket.io.js"></script><script src="https://unpkg.com/html5-qrcode"></script></head><body><div class="orb one"></div><div class="orb two"></div><main class="wrap"><nav class="nav"><a class="btn secondary" href="index.html">← Home</a><div class="brand">Remote Controller</div></nav><section id="connectPage" class="panel card"><div class="icon" style="margin:auto">📷</div><h1>Scan QR Code</h1><p style="color:var(--muted)">Scan the Host Device QR code or enter room ID manually.</p><div id="reader" class="scanner"></div><div style="height:18px"></div><input id="roomInput" placeholder="Enter Room ID"><div style="height:14px"></div><button class="btn" id="connectBtn">Connect</button><p id="connectStatus" class="status">Waiting for scan...</p></section><section id="controllerPage" class="controller card" style="display:none"><div class="topbar"><div><b>Connected to Host</b><br><span style="color:var(--muted)">DeviceBridge Remote</span></div><span class="pill"><span class="dot"></span> Live</span></div><button class="btn secondary" id="gyroBtn">Enable Motion Mouse</button><div class="touchpad" id="touchpad">Drag here to move mouse<br>Tap = click</div><div class="controls"><button class="btn" id="leftClick">Left Click</button><button class="btn" id="rightClick">Right Click</button><button class="btn secondary" id="scrollUp">Scroll Up</button><button class="btn secondary" id="scrollDown">Scroll Down</button></div><div style="height:16px"></div><input id="keyboardText" placeholder="Type text to send to host"><div style="height:12px"></div><button class="btn" id="sendText">Send Text</button><button class="btn danger" id="endControl">Disconnect</button></section></main><script src="script.js"></script><script>startController();</script></body></html>
