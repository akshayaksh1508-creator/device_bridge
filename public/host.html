<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Host Device - DeviceBridge</title><link rel="stylesheet" href="style.css"><script src="/socket.io/socket.io.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script></head><body><div class="orb one"></div><div class="orb two"></div><main class="wrap"><nav class="nav"><a class="btn secondary" href="index.html">← Home</a><div class="brand">Host Device</div></nav><section class="panel card"><div class="icon" style="margin:auto">🖥️</div><h1>Ready to Connect</h1><p class="status"><span class="dot"></span><span id="status">Creating secure room...</span></p><div class="room" id="roomId">------</div><div class="qrbox"><div id="qrcode"></div></div><button class="btn" id="copyBtn">Copy Pairing Link</button><button class="btn danger" id="disconnectBtn" style="display:none;margin-left:10px">Disconnect</button><p id="agentStatus" class="pill" style="margin-top:18px">Desktop agent: not connected</p><div class="log card" id="log" style="margin-top:20px;display:none"></div></section></main><div class="modal" id="requestModal"><div class="card"><div class="icon" style="margin:auto">📱</div><h2>Remote controller wants access</h2><p id="deviceName">Device: Mobile Controller</p><button class="btn" id="allowBtn">Allow</button><button class="btn danger" id="rejectBtn">Reject</button></div></div><script src="script.js"></script><script>startHost();</script></body></html>
